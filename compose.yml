services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: backupr-server
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5174
      - BUN_GC=aggressive
    networks:
      backupr_network:
        aliases:
          - backupr-server
      web_network:
        aliases:
          - backupr-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5174/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: backupr-web
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      backupr_network: {}
      web_network:
        aliases:
          - backupr_web
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  backupr_proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    container_name: backupr_proxy
    networks:
      backupr_network: {}
      web_network:
        aliases:
          - backupr_proxy
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  backupr_network:
    driver: bridge
    name: backupr_network
  web_network:
    external: true
    name: mkserver-shared
