services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: backupr-server
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5174
    networks:
      backupr_network:
        aliases:
          - backupr-server
      web_network:
        aliases:
          - backupr-server
      dokploy-network: {}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5174/ping').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: backupr-web
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      backupr_network: {}
      web_network:
        aliases:
          - backupr
      dokploy-network: {}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5173').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  backupr_network:
    driver: bridge
    name: backupr_network
  web_network:
    external: true
    name: mkserver-shared
  dokploy-network:
    external: true
