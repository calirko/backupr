services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: backupr-server
    ports:
      - "5174:5174"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://backupr:backupr_password@database:5432/backupr
    networks:
      - backupr_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5174/ping').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: backupr-web
    ports:
      - "5173:5173"
    networks:
      - backupr_networkw
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: http://server:5174
      WS_URL: ws://server:5174
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5173').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  backupr_network:
    driver: bridge
    name: backupr_network
