services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: backupr-server
    environment:
      NODE_ENV: production
      PORT: 5174
      SERVER_URL: ${SERVER_URL}
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    networks:
      backupr_network:
        aliases:
          - backupr-server
      web_network:
        aliases:
          - backupr-server
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5174/ping').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: backupr-web
    networks:
      backupr_network: {}
      web_network:
        aliases:
          - backupr
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: http://backupr-server:5174
      WS_URL: ws://backupr-server:5174
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:5173').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  backupr_network:
    driver: bridge
    name: backupr_network
  web_network:
    external: true
    name: mkserver-shared
